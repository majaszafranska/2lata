<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2 lata</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    overflow:hidden;
    font-family:'Montserrat',sans-serif;

    background:linear-gradient(
        145deg,
        #2e294e 0%,
        #5b4b8a 35%,
        #8b5fbf 65%,
        #d17ba3 85%,
        #f4a261 100%
    );

    position:relative;
}

/* stars */
body::before{
    content:"";
    position:absolute;
    inset:0;

    background-image:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.5) 1px, transparent 1px),
        radial-gradient(circle at 70% 40%, rgba(255,255,255,.35) 1px, transparent 1px),
        radial-gradient(circle at 40% 80%, rgba(255,255,255,.4) 1px, transparent 1px);

    background-size:250px 250px;
    pointer-events:none;
}

/* ================= CENTER ================= */

.center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    z-index:10;
}

.item{
    color:white;
    font-size:clamp(2rem,6vw,5rem);
    font-weight:800;
    margin:14px 0;
    cursor:pointer;
    user-select:none;
    text-shadow:0 3px 12px rgba(0,0,0,.25);
}

.years-title{
    color:#ffd166;
}

/* ================= TIMELINE ================= */

.timeline{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    width:min(700px,85vw);
    color:white;
    opacity:0;
    transition:.6s ease;
}

.timeline.show{
    opacity:1;
}

.timeline-line{
    height:4px;
    background:linear-gradient(90deg,#ffffff,#ffd166,#ffffff);
    border-radius:20px;
    margin:10px 0;

    transform:scaleX(0);
    transform-origin:left;
}

.timeline.show .timeline-line{
    animation:
        drawLine 1.2s ease forwards,
        glowLine 3s ease-in-out infinite 1.2s;
}

@keyframes drawLine{
    to{
        transform:scaleX(1);
    }
}

@keyframes glowLine{
    0%,100%{
        box-shadow:0 0 0 rgba(0,0,0,0);
        opacity:0.85;
    }
    50%{
        box-shadow:0 0 18px rgba(255,209,102,0.6);
        opacity:1;
    }
}

.timeline-dates{
    display:flex;
    justify-content:space-between;
}

/* ================= HEARTS ================= */

.heart-area{
    position:absolute;
    left:8%;
    top:50%;
    transform:translateY(-50%);
    width:220px;
    height:200px;
}

.heart{
    position:absolute;
    width:80px;
    height:80px;

    opacity:0;
    transition:all 0.9s ease;
}

.heart::before,
.heart::after{
    content:"";
    position:absolute;
    width:40px;
    height:64px;

    background:linear-gradient(145deg,#ff7aa2,#ffb3c7);
    border-radius:40px 40px 0 0;

    box-shadow:0 8px 20px rgba(0,0,0,.2);
}

.heart::before{
    left:20px;
    transform:rotate(-45deg);
    transform-origin:0 100%;
}

.heart::after{
    left:0;
    transform:rotate(45deg);
    transform-origin:100% 100%;
}

#heart1{
    left:0;
    top:40%;
}

#heart2{
    right:0;
    top:55%;
}

.heart.show{
    opacity:1;
}

#heart1.move{
    left:70px;
}

#heart2.move{
    right:70px;
}

#heart1.merged{
    left:35px;
    top:48%;
    transform:scale(1.25);
    opacity:1;
    animation:heartbeat 1.6s infinite;
}

#heart2.merged{
    opacity:0;
    transform:scale(0.3);
}

@keyframes heartbeat{
    0%,100%{transform:scale(1.25);}
    50%{transform:scale(1.38);}
}

/* ================= MAP ================= */

.map-card{
    position:absolute;
    right:5%;
    top:45%;

    width:min(420px,85vw);

    padding:18px;
    border-radius:20px;

    background:rgba(255,255,255,.12);
    backdrop-filter:blur(12px);

    opacity:0;
    transition:.6s ease;
}

.map-card.show{
    opacity:1;
}

.continents{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:35px;
}

.continent{
    display:flex;
    flex-direction:column;
    align-items:center;

    opacity:0;
    transform:translateY(25px) scale(.9);
}

.continent img{
    width:150px;
    max-width:35vw;
    filter:
        drop-shadow(0 0 12px rgba(255,255,255,.15))
        drop-shadow(0 0 25px rgba(255,209,102,.2));

    transition:.4s;
}

.continent span{
    margin-top:10px;
    color:white;
    font-weight:700;
    letter-spacing:1px;
}

.map-card.show .europe{
    animation:continentAppear .9s ease forwards;
}

.map-card.show .asia{
    animation:continentAppear .9s ease .35s forwards;
}

@keyframes continentAppear{
    0%{
        opacity:0;
        transform:translateY(25px) scale(.9);
    }

    70%{
        opacity:1;
        transform:translateY(-4px) scale(1.04);
    }

    100%{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

.map-card.show .continent img{
    animation:floatMap 5s ease-in-out infinite;
}

.map-card.show .asia img{
    animation-delay:1.5s;
}

@keyframes floatMap{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-8px);
    }
}

.connection{
    position:absolute;
    top:50%;
    left:50%;
    width:180px;
    height:2px;

    transform:translate(-50%,-50%);

    background:linear-gradient(
        90deg,
        transparent,
        #ffd166,
        transparent
    );

    opacity:0;
}

.map-card.show .connection{
    animation:lineGlow 1.5s ease forwards;
}

@keyframes lineGlow{
    from{
        opacity:0;
        width:0;
    }

    to{
        opacity:1;
        width:180px;
    }
}

/* ================= CATS ================= */

.cats{
    position:absolute;
    bottom:60px;
    left:50%;
    transform:translateX(-50%);

    display:flex;
    gap:15px;
}

.cats img{
    width:110px;
    height:110px;
    object-fit:cover;

    border-radius:16px;
    border:4px solid rgba(255,255,255,.9);

    opacity:0;
    transform:translateY(15px) scale(0.9);
}

.cats.show img{
    animation:catAppear .9s ease forwards;
}

/* first pair */
.cats.show img:nth-child(1),
.cats.show img:nth-child(2){
    animation-delay:0s;
}

/* second pair */
.cats.show img:nth-child(3),
.cats.show img:nth-child(4){
    animation-delay:.5s;
}

@keyframes catAppear{
    0%{
        opacity:0;
        transform:translateY(15px) scale(0.9);
    }

    70%{
        opacity:1;
        transform:translateY(0) scale(1.05);
    }

    100%{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

@media (max-width: 768px){

    .center{
        top:20%;
    }

    .heart-area{
        left:50%;
        top:36%;
        transform:translate(-50%, -50%) scale(0.65);
    }

    .map-card{
        top:48%;
        left:50%;
        right:auto;
        transform:translateX(-50%);
        width:90vw;
    }

    .cats{
        display:grid;
        grid-template-columns:repeat(2, 1fr);
        gap:12px;

        bottom:30px;
        left:50%;
        transform:translateX(-50%);
    }

    .cats img{
        width:60px;
        height:60px;
    }

    .timeline{
        width:90vw;
        bottom:10px;
    }

    .item{
        font-size:1.4rem;
        line-height:1.1;
        margin:8px 0;
    }

}

</style>
</head>

<body>

<div class="center">

    <div class="item years-title" onclick="toggle('timeline')">
        2 lata
    </div>

    <div class="item" onclick="startHearts()">
        2 serca
    </div>

    <div class="item" onclick="toggle('map')">
        2 kontynenty
    </div>

    <div class="item" onclick="toggle('cats')">
        2x2 koty
    </div>

</div>

<!-- HEARTS -->
<div class="heart-area">
    <div class="heart" id="heart1"></div>
    <div class="heart" id="heart2"></div>
</div>

<!-- TIMELINE -->
<div class="timeline hidden" id="timeline">
    <div class="timeline-dates">
        <span>2024</span>
        <span>2026</span>
    </div>
    <div class="timeline-line"></div>
</div>

<!-- MAP -->
<div class="map-card hidden" id="map">

    <div class="continents">

	<a href="eu/map.html" class="continent europe">
            <img src="eu.png">
	</a>

	<a href="as/map.html" class="continent asia">
	    <img src="as.png">
	</a>

	<!-- <div class="connection"></div> -->

    </div>

</div>

<!-- CATS -->
<div class="cats hidden" id="cats">

    <img src="1x1.png">
    <img src="1x2.png">
    <img src="2x1.png">
    <img src="2x2.png">

</div>

<script>

function toggle(id){
    document.getElementById(id).classList.toggle("show");
}

function startHearts(){

    const h1 = document.getElementById("heart1");
    const h2 = document.getElementById("heart2");

    h1.className = "heart show";
    h2.className = "heart show";

    setTimeout(() => {
        h1.classList.add("move");
        h2.classList.add("move");
    }, 150);

    setTimeout(() => {
        h1.classList.add("merged");
        h2.classList.add("merged");
    }, 1100);

}

</script>

</body>
</html>
